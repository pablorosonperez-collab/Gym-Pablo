    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #07071a; --bg2: #0d0d25; --bg3: #1a1a35;
      --text: #ffffff; --text2: #8B8FA8; --text3: #6b6b8a;
      --border: #1a1a35;

    /* NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; padding: 12px 4px 10px; border: none; background: none; color: var(--text2); font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.15s; }
    .nav-btn.active { color: #00E5FF; }
    .nav-icon { font-size: 20px; }

    /* HEADER */
    .header { padding: 52px 20px 16px; background: linear-gradient(180deg, #0d0d25 0%, var(--bg) 100%); }
    .header-sub { font-size: 10px; color: var(--text2); letter-spacing: 2px; margin-bottom: 4px; }
    .header-title { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
    .header-title span { color: #00E5FF; }

    /* SECTIONS */
    .section { display: none; padding: 0 16px; }
    .section.active { display: block; }

    /* CARDS */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
    .card-label { font-size: 10px; color: var(--text2); letter-spacing: 2px; margin-bottom: 8px; }

    /* DAY SCROLL */
    .day-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 12px; scrollbar-width: none; }
    .day-scroll::-webkit-scrollbar { display: none; }
    .day-chip { flex: 0 0 auto; padding: 10px 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg2); cursor: pointer; text-align: center; min-width: 90px; transition: all 0.15s; }
    .day-chip.active { border-color: var(--day-accent); background: color-mix(in srgb, var(--day-accent) 12%, transparent); }
    .day-chip-label { font-size: 9px; letter-spacing: 1.5px; color: var(--text2); margin-bottom: 3px; }
    .day-chip.active .day-chip-label { color: var(--day-accent); }
    .day-chip-name { font-size: 11px; font-weight: 600; color: var(--text3); line-height: 1.3; }
    .day-chip.active .day-chip-name { color: var(--text); }

    /* EXERCISE */
    .ex-card { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--day-accent); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
    .ex-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .ex-num { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
    .ex-name { font-size: 14px; font-weight: 600; flex: 1; }
    .ex-sets { font-size: 18px; font-weight: 700; white-space: nowrap; }
    .ex-rest { font-size: 10px; color: var(--text3); }
    .ex-note { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
    .muscle-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-top: 4px; }
    .muscle-label { font-size: 10px; color: var(--text3); margin-right: 2px; }
    .muscle-pill { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
    .muscle-sec { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

    /* NUTRITION */
    .macro-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .macro-chip { flex: 1; padding: 10px 6px; border-radius: 10px; text-align: center; }
    .macro-val { font-size: 16px; font-weight: 700; }
    .macro-lbl { font-size: 9px; color: var(--text2); margin-top: 2px; letter-spacing: 1px; }
    .meal-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
    .meal-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; gap: 8px; }
    .meal-time { font-size: 13px; font-weight: 700; min-width: 44px; }
    .meal-info { flex: 1; }
    .meal-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .meal-detail { font-size: 12px; color: var(--text2); line-height: 1.4; margin-bottom: 6px; }
    .meal-macros { display: flex; gap: 6px; flex-wrap: wrap; }
    .meal-macro { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
    .meal-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-bottom: 4px; display: inline-block; }
    .meal-alt { padding: 12px 14px; border-top: 1px solid var(--border); background: #ffffff08; }
    .meal-alt-label { font-size: 10px; color: var(--text3); letter-spacing: 1.5px; margin-bottom: 6px; }
    .chevron { font-size: 14px; color: var(--text3); transition: transform 0.2s; margin-top: 2px; }
    .chevron.open { transform: rotate(180deg); }

    /* PROGRESS */
    .input-group { margin-bottom: 12px; }
    .input-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; margin-bottom: 6px; display: block; }
    .inp { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 14px; -webkit-appearance: none; }
    .inp:focus { outline: none; border-color: #00E5FF; }
    select.inp { appearance: none; -webkit-appearance: none; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .save-btn { width: 100%; padding: 14px; background: #00E5FF; color: #07071a; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
    .save-btn:active { opacity: 0.8; }

    /* HISTORY */
    .entry-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
    .entry-date { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .entry-metrics { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .entry-metric { padding: 6px 10px; border-radius: 8px; text-align: center; }
    .entry-val { font-size: 15px; font-weight: 700; }
    .entry-lbl { font-size: 9px; color: var(--text2); letter-spacing: 1px; }
    .entry-delta-pos { font-size: 10px; color: var(--accent1); font-weight: 600; }
    .entry-delta-neg { font-size: 10px; color: var(--accent2); font-weight: 600; }
    .entry-delta-neu { font-size: 10px; color: var(--text3); font-weight: 600; }
    .feedback-item { border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.6; margin-bottom: 6px; }
    .del-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 4px; float: right; }

    /* CHART */
    .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
    .chart-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
    .chart-title { font-size: 13px; font-weight: 600; }
    .chart-delta { font-size: 12px; font-weight: 600; }

    .loading { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; }
    .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: #1D9E75; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...options.headers
    },
    ...options
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function getEntries() {
  return await sbFetch('progress?order=date.asc');
}

async function insertEntry(data) {
  return await sbFetch('progress', { method: 'POST', body: JSON.stringify(data) });
}

async function deleteEntryById(id) {
  return await sbFetch(`progress?id=eq.${id}`, { method: 'DELETE' });

    macros:{ p:20, c:24, f:1, kcal:185 },
    alt:{ detail:"Leche semidesnatada 300ml + fruta", macros:{ p:10, c:26, f:5, kcal:189 } }
  },
  { time:"21:00", name:"Cena", tag:"Post-entreno", tagColor:"#1D9E7530", tagText:"#1D9E75",
    detail:"Salmón 220g + arroz blanco 120g + brócoli + aguacate 40g",
    macros:{ p:52, c:25, f:22, kcal:502 },
    alt:{ detail:"Pechuga 220g + arroz 120g + verduras + huevo 1", macros:{ p:58, c:25, f:10, kcal:426 } }
  },
];

const REST_MEALS = [
  { time:"08:00", name:"Desayuno", tag:"Rápido", tagColor:"#88878030", tagText:"#888780",
    detail:"Batido whey 35g + fruta de temporada",
    macros:{ p:31, c:20, f:2, kcal:222 },
    alt:{ detail:"Yogur griego 0% 250g + frutos rojos 100g", macros:{ p:22, c:16, f:1, kcal:161 } }
  },
  { time:"12:30", name:"Comida", tag:"Comida principal", tagColor:"#88878030", tagText:"#888780",
    detail:"Merluza o ternera 200g + ensalada + arroz integral 60g + aguacate 50g",
    macros:{ p:44, c:18, f:12, kcal:356 },
    alt:{ detail:"4 huevos + espinacas + boniato 100g", macros:{ p:28, c:22, f:14, kcal:326 } }
  },
  { time:"17:00", name:"Merienda", tag:"Merienda", tagColor:"#88878030", tagText:"#888780",
    detail:"Yogur griego 0% 200g + nueces 20g",
    macros:{ p:20, c:8, f:13, kcal:225 },
    alt:{ detail:"Queso cottage 150g + almendras 20g", macros:{ p:19, c:5, f:12, kcal:204 } }
  },
  { time:"21:00", name:"Cena", tag:"Cena", tagColor:"#88878030", tagText:"#888780",
    detail:"Salmón 180g + verduras + aceite de coco 8g + boniato 80g",
    macros:{ p:38, c:18, f:18, kcal:386 },
    alt:{ detail:"3 huevos + pechuga 100g + aguacate 60g + tomate", macros:{ p:40, c:6, f:18, kcal:338 } }
  },
];

let selectedDay = 0;
const openMeals = {};

// INIT
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
  renderDayScroll();
  renderDayContent();
  renderNutrition();
});

function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') loadHistory();
}

function renderDayScroll() {
  const el = document.getElementById('day-scroll');
  el.innerHTML = DAYS.map((d, i) => `
    <div class="day-chip ${i===selectedDay?'active':''}" style="--day-accent:${d.accent}" onclick="selectDay(${i})">
      <div class="day-chip-label">${d.label.toUpperCase()}</div>
      <div class="day-chip-name">${d.focus}</div>
    </div>
  `).join('');
}

function selectDay(i) {
  selectedDay = i;
  renderDayScroll();
  renderDayContent();
}

function renderDayContent() {
  const d = DAYS[selectedDay];
  const el = document.getElementById('day-content');
  el.style.setProperty('--day-accent', d.accent);
  el.innerHTML = `
    <div style="padding: 0 16px; margin-bottom: 12px;">
      <div style="background: var(--bg2); border: 1px solid ${d.accent}40; border-radius: 14px; padding: 14px;">
        <div style="font-size:10px;color:${d.accent};letter-spacing:2px;margin-bottom:4px;">${d.label.toUpperCase()} · ${d.type==='train'?'ENTRENO':d.type==='cardio'?'CARDIO':'DESCANSO'}</div>
        <div style="font-size:17px;font-weight:700;margin-bottom:6px;">${d.focus}</div>
        <div style="font-size:12px;color:var(--text2);"><span style="color:${d.accent};font-weight:600;">Cardio: </span>${d.cardio}</div>
      </div>
    </div>
    <div style="padding: 0 16px;">
      ${d.training.map((ex, i) => `
        <div class="ex-card" style="--day-accent:${d.accent}">
          <div class="ex-header">
            <span class="ex-num" style="background:${d.accent}20;color:${d.accent};">${String(i+1).padStart(2,'0')}</span>
            <span class="ex-name">${ex.ex}</span>
            <div style="text-align:right;">
              <div class="ex-sets" style="color:${d.accent};">${ex.sets}×${ex.reps}</div>
              <div class="ex-rest">${ex.rest}</div>
            </div>
          </div>
          <div class="ex-note">${ex.note}</div>
          <div class="muscle-row">
            <span class="muscle-label">Principal:</span>
            ${ex.primary.map(m => `<span class="muscle-pill" style="background:${d.accent}20;color:${d.accent};">${m}</span>`).join('')}
          </div>
          <div class="muscle-row" style="margin-top:4px;">
            <span class="muscle-label">Secundario:</span>
            ${ex.secondary.map(m => `<span class="muscle-pill muscle-sec">${m}</span>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderNutrition() {
  const d = DAYS[selectedDay];
  const isTrain = d.type === 'train';
  const meals = isTrain ? TRAIN_MEALS : REST_MEALS;
  const kcal = isTrain ? 2900 : 2400;
  const totalP = meals.reduce((s,m)=>s+m.macros.p,0);
  const totalC = meals.reduce((s,m)=>s+m.macros.c,0);
  const totalF = meals.reduce((s,m)=>s+m.macros.f,0);
  const el = document.getElementById('nutrition-content');
  el.innerHTML = `
    <div style="padding: 0 16px;">
      <div class="card" style="margin-bottom:12px;">
        <div class="card-label">DÍA DE ${isTrain?'ENTRENO':'DESCANSO'} · OBJETIVO DIARIO</div>
        <div style="font-size:28px;font-weight:700;color:#00E5FF;margin-bottom:12px;">${kcal.toLocaleString()} kcal</div>
        <div class="macro-row">
          <div class="macro-chip" style="background:#1D9E7520;">
            <div class="macro-val" style="color:#1D9E75;">${totalP}g</div>
            <div class="macro-lbl">PROTEÍNA</div>
          </div>
          <div class="macro-chip" style="background:#D85A3020;">
            <div class="macro-val" style="color:#D85A30;">${totalC}g</div>
            <div class="macro-lbl">HIDRATOS</div>
          </div>
          <div class="macro-chip" style="background:#BA751720;">
            <div class="macro-val" style="color:#BA7517;">${totalF}g</div>
            <div class="macro-lbl">GRASAS</div>
          </div>
        </div>
      </div>
      ${meals.map((m, mi) => {
        const key = `n_${mi}`;
        const isOpen = !!openMeals[key];
        return `
        <div class="meal-card">
          <div class="meal-header" onclick="toggleMeal('${key}')">
            <div class="meal-info" style="flex:1;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
                <span class="meal-time" style="color:#00E5FF;">${m.time}</span>
                <span class="meal-name">${m.name}</span>
                <span class="meal-tag" style="background:${m.tagColor};color:${m.tagText};">${m.tag}</span>
              </div>
              <div class="meal-detail">${m.detail}</div>
              <div class="meal-macros">
                <span class="meal-macro" style="background:#1D9E7520;color:#1D9E75;">${m.macros.p}g prot</span>
                <span class="meal-macro" style="background:#D85A3020;color:#D85A30;">${m.macros.c}g hid</span>
                <span class="meal-macro" style="background:#BA751720;color:#BA7517;">${m.macros.f}g gras</span>
                <span style="font-size:11px;color:var(--text3);padding:2px 6px;">${m.macros.kcal} kcal</span>
              </div>
            </div>
            <div class="chevron ${isOpen?'open'}">▾</div>
          </div>
          ${isOpen ? `
          <div class="meal-alt">
            <div class="meal-alt-label">ALTERNATIVA SI NO TIENES LOS INGREDIENTES</div>
            <div class="meal-detail" style="margin-bottom:8px;">${m.alt.detail}</div>
            <div class="meal-macros">
              <span class="meal-macro" style="background:#1D9E7520;color:#1D9E75;">${m.alt.macros.p}g prot</span>
              <span class="meal-macro" style="background:#D85A3020;color:#D85A30;">${m.alt.macros.c}g hid</span>
              <span class="meal-macro" style="background:#BA751720;color:#BA7517;">${m.alt.macros.f}g gras</span>
              <span style="font-size:11px;color:var(--text3);padding:2px 6px;">${m.alt.macros.kcal} kcal</span>
            </div>
          </div>` : ''}
        </div>
      `}).join('')}
      <div style="font-size:12px;color:var(--text2);padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;line-height:1.6;margin-bottom:12px;">
        Toca cada comida para ver la alternativa. Ajusta hasta 150 kcal sin salirte del objetivo.
      </div>
    </div>
  `;
}

function toggleMeal(key) {
  openMeals[key] = !openMeals[key];
  renderNutrition();
}

function getFeedback(entry, prev) {
  if (!prev) return [{ type:'info', text:'Primer registro guardado. La semana que viene verás aquí el análisis de tu evolución.' }];
  const flags = [];
  const wD = entry.weight - prev.weight;
  const fD = entry.fat ? (entry.fat - (prev.fat || entry.fat)) : null;
  if (wD > 0.6) flags.push({ type:'warn', text:`Has subido ${wD.toFixed(1)}kg. Si la grasa también sube, revisa las calorías en días de descanso.` });
  else if (wD < -0.8) flags.push({ type:'warn', text:`Has bajado ${Math.abs(wD).toFixed(1)}kg. Más de 0.7kg/semana puede indicar déficit demasiado agresivo. Revisa las 2.900 kcal en días de entreno.` });
  else flags.push({ type:'good', text:`Peso estable (${wD>=0?'+':''}${wD.toFixed(1)}kg). Para recomposición esto es correcto si la grasa baja.` });
  if (fD !== null) {
    if (fD < -0.3) flags.push({ type:'good', text:`Grasa bajando (${fD.toFixed(1)}%). Mantén el déficit en días de descanso.` });
    else if (fD > 0.3) flags.push({ type:'warn', text:`Grasa subiendo (+${fD.toFixed(1)}%). Revisa las 2.400 kcal en días de descanso y el cardio zona 2.` });
  }
  if (entry.sleep && entry.sleep < 7) flags.push({ type:'warn', text:`Sueño por debajo de 7h (${entry.sleep}h). El cortisol elevado frena la síntesis muscular y activa la retención de grasa.` });
  if (entry.energy && entry.energy <= 2) flags.push({ type:'warn', text:`Energía baja en entrenos. Prueba a subir 30-40g de arroz en la comida de las 12:30.` });
  else if (entry.energy && entry.energy >= 4) flags.push({ type:'good', text:`Buena energía en los entrenos. El pre-entreno de las 12:30 está funcionando bien.` });
  return flags;
}

function feedbackColor(type) {
  if (type === 'good') return { bg:'#1D9E7520', color:'#1D9E75' };
  if (type === 'warn') return { bg:'#D85A3020', color:'#D85A30' };
  return { bg:'#378ADD20', color:'#378ADD' };
}

async function saveEntry() {
  const date = document.getElementById('f_date').value;
  const weight = parseFloat(document.getElementById('f_weight').value);
  if (!date || isNaN(weight)) { showToast('La fecha y el peso son obligatorios', false); return; }
  const data = {
    date, weight,
    fat: parseFloat(document.getElementById('f_fat').value) || null,
    muscle: parseFloat(document.getElementById('f_muscle').value) || null,
    water: parseFloat(document.getElementById('f_water').value) || null,
    sleep: parseFloat(document.getElementById('f_sleep').value) || null,
    energy: parseInt(document.getElementById('f_energy').value) || null,
    days: parseInt(document.getElementById('f_days').value) || null,
    diet: parseInt(document.getElementById('f_diet').value) || null,
    notes: document.getElementById('f_notes').value || null,
  };
  try {
    await insertEntry(data);
    showToast('Entrada guardada');
    document.getElementById('f_weight').value = '';
    document.getElementById('f_fat').value = '';
    document.getElementById('f_muscle').value = '';
    document.getElementById('f_water').value = '';
    document.getElementById('f_sleep').value = '';
    document.getElementById('f_energy').value = '';
    document.getElementById('f_days').value = '';
    document.getElementById('f_diet').value = '';
    document.getElementById('f_notes').value = '';
  } catch(e) { showToast('Error al guardar', false); }
}

async function loadHistory() {
  const el = document.getElementById('history-content');
  el.innerHTML = '<div class="loading">Cargando historial...</div>';
  try {
    const entries = await getEntries();
    if (!entries.length) { el.innerHTML = '<div class="loading">No hay registros todavía. Añade tu primera entrada en Progreso.</div>'; return; }
    el.innerHTML = '<div style="padding: 0 16px;">' + [...entries].reverse().map((e, ri) => {
      const idx = entries.length - 1 - ri;
      const prev = idx > 0 ? entries[idx-1] : null;
      const feedback = getFeedback(e, prev);
      const wD = prev ? e.weight - prev.weight : null;
      const fD = (prev && e.fat && prev.fat) ? e.fat - prev.fat : null;
      const dietLabels = ['','Muy mala','Mala','Regular','Buena','Perfecta'];
      return `
        <div class="entry-card">
          <button class="del-btn" onclick="confirmDelete('${e.id}')">✕</button>
          <div class="entry-date">${e.date} ${e.days ? '· '+e.days+' días entrenados' : ''} ${e.diet ? '· Dieta: '+dietLabels[e.diet] : ''}</div>
          <div class="entry-metrics">
            ${e.weight ? `<div class="entry-metric" style="background:#1D9E7520;">
              <div class="entry-val" style="color:#1D9E75;">${e.weight}kg</div>
              <div class="entry-lbl">PESO</div>
              ${wD !== null ? `<div class="${Math.abs(wD)<0.1?'entry-delta-neu':wD>0?'entry-delta-neg':'entry-delta-pos'}">${wD>=0?'+':''}${wD.toFixed(1)}kg</div>` : ''}
            </div>` : ''}
            ${e.fat ? `<div class="entry-metric" style="background:#D85A3020;">
              <div class="entry-val" style="color:#D85A30;">${e.fat}%</div>
              <div class="entry-lbl">GRASA</div>
              ${fD !== null ? `<div class="${Math.abs(fD)<0.1?'entry-delta-neu':fD<0?'entry-delta-pos':'entry-delta-neg'}">${fD>=0?'+':''}${fD.toFixed(1)}%</div>` : ''}
            </div>` : ''}
            ${e.muscle ? `<div class="entry-metric" style="background:#378ADD20;">
              <div class="entry-val" style="color:#378ADD;">${e.muscle}kg</div>
              <div class="entry-lbl">MÚSCULO</div>
            </div>` : ''}
            ${e.sleep ? `<div class="entry-metric" style="background:#BA751720;">
              <div class="entry-val" style="color:#BA7517;">${e.sleep}h</div>
              <div class="entry-lbl">SUEÑO</div>
            </div>` : ''}
            ${e.energy ? `<div class="entry-metric" style="background:#ffffff10;">
              <div class="entry-val">${e.energy}/5</div>
              <div class="entry-lbl">ENERGÍA</div>
            </div>` : ''}
          </div>
          ${feedback.map(f => { const c = feedbackColor(f.type); return `<div class="feedback-item" style="background:${c.bg};color:${c.color};">${f.text}</div>`; }).join('')}
          ${e.notes ? `<div style="font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">${e.notes}</div>` : ''}
        </div>
      `;
    }).join('') + '</div>';
  } catch(e) { el.innerHTML = '<div class="loading">Error cargando datos.</div>'; }
}

async function confirmDelete(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  try { await deleteEntryById(id); showToast('Registro eliminado'); loadHistory(); }
  catch(e) { showToast('Error al eliminar', false); }
}

function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#1D9E75' : '#D85A30';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
